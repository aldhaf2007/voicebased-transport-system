<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Voice Transport Gateway</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='50' font-size='80' text-anchor='middle' dominant-baseline='middle'>🛡️</text></svg>">
    <style>
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
            margin-top: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }
        .form-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
        .auth-btn {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border: none;
            color: white;
            padding: 0.9rem;
            border-radius: 12px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(244, 63, 94, 0.6);
        }
        .auth-btn:active {
            transform: translateY(0);
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .flash-messages {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
        }
        .flash-message {
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .flash-message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .flash-message.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
        }
    </style>
</head>
<body>

<div class="transport-bg-logos">
    <div class="bg-logo" style="top: 10%; left: 5%; transform: rotate(-15deg);">✈️</div>
    <div class="bg-logo" style="top: 65%; left: 8%; transform: rotate(10deg);">🚄</div>
    <div class="bg-logo" style="top: 35%; left: 80%; transform: rotate(-5deg);">🚌</div>
    <div class="bg-logo" style="top: 85%; left: 75%; transform: rotate(20deg);">🚇</div>
    <div class="bg-logo" style="top: 20%; left: 60%; transform: rotate(15deg);">🚢</div>
</div>



    <div class="dashboard-container">
        <header>
            <h1>🛡️ Admin Portal</h1>
            <p>Access the administrative dashboard</p>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form class="auth-form" method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="auth-btn">Secure Login</button>
        </form>

        <div class="auth-footer">
            <a href="/" style="font-weight: normal; font-size: 0.85rem; color: var(--text-secondary);">&larr; Return to Public Site</a>
        </div>
    </div>

</body>
</html>
